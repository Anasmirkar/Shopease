<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase Bridge - POS Order Fetcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-y: auto;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }

    .header h1 {
      font-size: 28px;
      color: #00d4ff;
      margin-bottom: 5px;
    }

    .header p {
      color: #888;
      font-size: 14px;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #00d4ff;
      display: flex;
      align-items: center;
    }

    .card h2 .icon {
      margin-right: 8px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #aaa;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      background: #1e1e2e;
      border: 1px solid #3a3a4e;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #00d4ff;
      color: #1e1e2e;
      width: 100%;
    }

    .btn-primary:hover {
      background: #00b8d4;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .order-list {
      background: #1e1e2e;
      border: 1px solid #3a3a4e;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
    }

    .order-item {
      padding: 12px;
      border-bottom: 1px solid #3a3a4e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-item:hover {
      background: #2a2a3e;
    }

    .order-info {
      flex: 1;
    }

    .order-name {
      color: #00d4ff;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .order-details {
      color: #888;
      font-size: 12px;
    }

    .order-qty {
      background: #00d4ff;
      color: #1e1e2e;
      padding: 4px 8px;
      border-radius: 3px;
      font-weight: 600;
      margin: 0 10px;
      min-width: 40px;
      text-align: center;
    }

    .status {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status.loading {
      background: #3a3a4e;
      color: #aaa;
    }

    .status.success {
      background: #28a745;
      color: white;
    }

    .status.error {
      background: #dc3545;
      color: white;
    }

    .tab-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px 20px;
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: #00d4ff;
      color: #1e1e2e;
      border-color: #00d4ff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .settings-grid {
      display: grid;
      gap: 15px;
    }

    .summary {
      background: #1e1e2e;
      border: 1px solid #3a3a4e;
      border-radius: 4px;
      padding: 15px;
      margin-top: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #3a3a4e;
      font-size: 14px;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: #888;
    }

    .summary-value {
      color: #00d4ff;
      font-weight: 600;
    }

    .success-message {
      background: #28a745;
      color: white;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
    }

    .error-message {
      background: #dc3545;
      color: white;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
    }

    @media (max-width: 900px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3a3a4e;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏪 ShopEase Bridge</h1>
      <p>POS Order Fetching & Keyboard Emulation Tool</p>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('fetch')">📦 Fetch Orders</button>
      <button class="tab-btn" onclick="switchTab('history')">📋 History</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
    </div>

    <!-- Fetch Orders Tab -->
    <div id="fetch" class="tab-content active">
      <div class="main-content">
        <!-- Fetch Panel -->
        <div class="card">
          <h2><span class="icon">🔍</span> Fetch Order</h2>
          
          <div id="successMessage" class="success-message"></div>
          <div id="errorMessage" class="error-message"></div>

          <div class="form-group">
            <label>Order ID / Barcode Number</label>
            <input type="text" id="orderId" placeholder="Enter order ID or barcode..." />
          </div>

          <button class="btn btn-primary" onclick="fetchOrder()">Fetch Order Details</button>

          <div id="fetchStatus" class="status loading" style="display: none;"></div>
        </div>

        <!-- Preview Panel -->
        <div class="card">
          <h2><span class="icon">📋</span> Order Preview</h2>
          
          <div id="orderPreview">
            <p style="color: #888; text-align: center; padding: 40px 0;">
              Fetch an order to see details here
            </p>
          </div>

          <button class="btn btn-success" id="pasteBtn" onclick="pasteToWindow()" style="display: none; margin-top: 10px;">
            � Copy to Clipboard
          </button>
        </div>
      </div>
    </div>

    <!-- History Tab -->
    <div id="history" class="tab-content">
      <div class="card">
        <h2><span class="icon">📋</span> Transaction History</h2>
        <div id="historyList" style="max-height: 500px; overflow-y: auto;">
          <p style="color: #888; text-align: center; padding: 40px 0;">
            No transactions yet
          </p>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="settings" class="tab-content">
      <div class="card">
        <h2><span class="icon">⚙️</span> Configuration</h2>
        
        <div class="settings-grid">
          <div class="form-group">
            <label>Supabase URL</label>
            <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co" />
          </div>

          <div class="form-group">
            <label>Supabase API Key</label>
            <input type="password" id="supabaseKey" placeholder="Your API key" />
          </div>

          <div class="form-group">
            <label>Keyboard Delay (ms)</label>
            <input type="number" id="keyboardDelay" min="10" max="1000" value="50" />
            <small style="color: #888;">Delay between keyboard inputs (lower = faster)</small>
          </div>

          <div class="form-group">
            <label>Auto-paste Enabled</label>
            <input type="checkbox" id="autoPaste" />
            <small style="color: #888;">Automatically paste after fetching order</small>
          </div>

          <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    async function fetchOrder() {
      const orderId = document.getElementById('orderId').value.trim();
      if (!orderId) {
        showError('Please enter an Order ID or Barcode Number');
        return;
      }

      const statusEl = document.getElementById('fetchStatus');
      statusEl.textContent = 'Fetching order...';
      statusEl.style.display = 'block';
      statusEl.className = 'status loading';

      try {
        const result = await window.bridgeAPI.fetchOrder(orderId);
        
        if (result.success) {
          displayOrderPreview(result.data);
          showSuccess('Order fetched successfully!');
          statusEl.textContent = '✓ Order loaded';
          statusEl.className = 'status success';
        } else {
          showError('Failed to fetch order: ' + result.error);
          statusEl.textContent = '✗ Error loading order';
          statusEl.className = 'status error';
        }
      } catch (error) {
        showError('Error: ' + error.message);
        statusEl.textContent = '✗ Error';
        statusEl.className = 'status error';
      }
    }

    function displayOrderPreview(order) {
      const preview = document.getElementById('orderPreview');
      const items = order.items_snapshot || [];
      
      let html = `
        <div class="summary">
          <div class="summary-row">
            <span class="summary-label">Order ID:</span>
            <span class="summary-value">${order.id.substring(0, 12)}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Store:</span>
            <span class="summary-value">${order.store_name || 'N/A'}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Status:</span>
            <span class="summary-value">${order.status || 'pending'}</span>
          </div>
        </div>
      `;

      if (items.length > 0) {
        html += '<div class="order-list">';
        items.forEach(item => {
          html += `
            <div class="order-item">
              <div class="order-info">
                <div class="order-name">${item.product_name}</div>
                <div class="order-details">
                  Price: ₹${item.unit_price} | GST: ${item.gst_rate}%
                </div>
              </div>
              <div class="order-qty">${item.quantity}</div>
            </div>
          `;
        });
        html += '</div>';

        html += `
          <div class="summary" style="margin-top: 15px;">
            <div class="summary-row">
              <span class="summary-label">Subtotal:</span>
              <span class="summary-value">₹${(order.subtotal || 0).toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Tax (GST):</span>
              <span class="summary-value">₹${(order.tax_amount || 0).toFixed(2)}</span>
            </div>
            <div class="summary-row" style="border-bottom: 2px solid #3a3a4e; padding-top: 10px;">
              <span class="summary-label" style="font-weight: 700; color: #e0e0e0;">Total:</span>
              <span class="summary-value" style="font-size: 16px;">₹${(order.total_amount || 0).toFixed(2)}</span>
            </div>
          </div>
        `;
      }

      preview.innerHTML = html;
      document.getElementById('pasteBtn').style.display = 'block';
      window.currentOrder = order;
    }

    async function pasteToWindow() {
      if (!window.currentOrder) {
        showError('No order selected');
        return;
      }

      const items = window.currentOrder.items_snapshot || [];
      let text = '';

      // Format items for POS entry
      items.forEach(item => {
        text += `${item.product_name} x${item.quantity} @ ₹${item.unit_price}\n`;
      });

      text += `\nSubtotal: ₹${(window.currentOrder.subtotal || 0).toFixed(2)}\n`;
      text += `Tax: ₹${(window.currentOrder.tax_amount || 0).toFixed(2)}\n`;
      text += `Total: ₹${(window.currentOrder.total_amount || 0).toFixed(2)}\n`;

      try {
        const result = await window.bridgeAPI.pasteToWindow(text);
        showSuccess(result.message || 'Order copied! Press Ctrl+V in your POS');
      } catch (error) {
        showError('Failed to copy: ' + error.message);
      }
    }

    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = '❌ ' + message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = '✓ ' + message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function saveSettings() {
      const config = {
        supabaseUrl: document.getElementById('supabaseUrl').value,
        supabaseKey: document.getElementById('supabaseKey').value,
        keyboardDelay: parseInt(document.getElementById('keyboardDelay').value),
        autoPaste: document.getElementById('autoPaste').checked
      };

      try {
        const result = await window.bridgeAPI.saveConfig(config);
        if (result.success) {
          showSuccess('Settings saved successfully!');
        } else {
          showError('Failed to save settings: ' + result.error);
        }
      } catch (error) {
        showError('Error saving settings: ' + error.message);
      }
    }

    // Load settings on startup
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const config = await window.bridgeAPI.getConfig();
        if (config) {
          document.getElementById('supabaseUrl').value = config.supabaseUrl || '';
          document.getElementById('supabaseKey').value = config.supabaseKey || '';
          document.getElementById('keyboardDelay').value = config.keyboardDelay || 50;
          document.getElementById('autoPaste').checked = config.autoPaste || false;
        }
      } catch (error) {
        console.error('Failed to load settings:', error);
      }
    });
  </script>
</body>
</html>
